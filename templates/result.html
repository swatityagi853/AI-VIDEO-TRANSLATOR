<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            background: linear-gradient(to right, #768ebb, #6198b8);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 40px;
            margin-top: 20px;
        }

        video {
            width: 70%;
            display: ruby-base-container;
            margin: 20px auto;
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #ac8854;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #aa8e63;
        }

        #subtitle-box {
            display: none;
            background: white;
            color: rgb(158, 18, 18);
            width: 70%;
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }
    </style>

    <script>
        function toggleSubtitle() {
            var box = document.getElementById("subtitle-box");
            if (box.style.display === "none") {
                box.style.display = "block";
            } else {
                box.style.display = "none";
            }
        }
    </script>

</head>

<body>

    <h1>🎬 Translated Video Result</h1>

<!-- ORIGINAL VIDEO -->
<h2>🎥 Original Video</h2>
<video controls>
    <source src="/video/{{ original }}" type="video/mp4">
</video>

<h2>🌍 Translated Video</h2>
<video controls>
    <source src="/video/{{ video }}" type="video/mp4">
</video>

<!-- BUTTONS -->
<a href="/download/{{ video }}">
    <button class="btn">⬇ Download Video</button>
</a>

<button class="btn" onclick="toggleSubtitle()">📄 Show Subtitles</button>

<a href="/download_subtitle">
    <button class="btn">⬇ Download Subtitles</button>
</a>

<!-- SUBTITLE BOX -->
<div id="subtitle-box" style="display:none;">
    <h3>Subtitles:</h3>
    <p>{{ subtitles }}</p>
</div>

</body>
</html>
